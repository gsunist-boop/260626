<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #faf8ef;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
  }
  a.back {
    align-self: flex-start;
    margin-left: 20px;
    margin-bottom: 10px;
    text-decoration: none;
    color: #555;
    font-size: 14px;
  }
  h1 { margin-bottom: 6px; }
  #panel {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 16px;
  }
  #score {
    background: #bbada0;
    color: #fff;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: bold;
  }
  button.restart {
    font-size: 14px;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background: #8f7a66;
    color: #fff;
  }
  #boardWrap {
    background: #bbada0;
    border-radius: 8px;
    padding: 10px;
    position: relative;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-template-rows: repeat(4, 80px);
    gap: 10px;
  }
  .tile {
    background: rgba(238,228,218,0.35);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    color: #776e65;
    transition: all 0.1s ease;
  }
  .tile[data-v="2"] { background: #eee4da; }
  .tile[data-v="4"] { background: #ede0c8; }
  .tile[data-v="8"] { background: #f2b179; color: #fff; }
  .tile[data-v="16"] { background: #f59563; color: #fff; }
  .tile[data-v="32"] { background: #f67c5f; color: #fff; }
  .tile[data-v="64"] { background: #f65e3b; color: #fff; }
  .tile[data-v="128"] { background: #edcf72; color: #fff; font-size: 24px; }
  .tile[data-v="256"] { background: #edcc61; color: #fff; font-size: 24px; }
  .tile[data-v="512"] { background: #edc850; color: #fff; font-size: 24px; }
  .tile[data-v="1024"] { background: #edc53f; color: #fff; font-size: 20px; }
  .tile[data-v="2048"] { background: #edc22e; color: #fff; font-size: 20px; }
  #message {
    margin-top: 16px;
    font-size: 18px;
    font-weight: bold;
    min-height: 24px;
  }
  #hint {
    margin-top: 10px;
    color: #776e65;
    font-size: 14px;
  }
</style>
</head>
<body>
<a class="back" href="index.html">← 허브로 돌아가기</a>
<h1>🔢 2048</h1>
<div id="panel">
  <div id="score">점수: 0</div>
  <button class="restart" id="restartBtn">새 게임</button>
</div>
<div id="boardWrap">
  <div id="board"></div>
</div>
<div id="message"></div>
<div id="hint">방향키로 타일을 이동하세요</div>

<script>
const SIZE = 4;
let grid = [];
let score = 0;
let gameOver = false;

const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

function initGame() {
  grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  score = 0;
  gameOver = false;
  messageEl.textContent = '';
  scoreEl.textContent = '점수: 0';
  addRandomTile();
  addRandomTile();
  render();
}

function addRandomTile() {
  const empties = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empties.push([r, c]);
  if (empties.length === 0) return;
  const [r, c] = empties[Math.floor(Math.random() * empties.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  boardEl.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const v = grid[r][c];
      if (v) {
        tile.dataset.v = v;
        tile.textContent = v;
      }
      boardEl.appendChild(tile);
    }
  }
  scoreEl.textContent = `점수: ${score}`;
}

function slideRowLeft(row) {
  let arr = row.filter(v => v !== 0);
  let moved = false;
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      score += arr[i];
      arr.splice(i + 1, 1);
      moved = true;
    }
  }
  while (arr.length < SIZE) arr.push(0);
  if (arr.join(',') !== row.join(',')) moved = true;
  return { row: arr, moved };
}

function rotateGridCW(g) {
  const n = g.length;
  const res = Array.from({ length: n }, () => Array(n).fill(0));
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      res[c][n - 1 - r] = g[r][c];
  return res;
}

function move(direction) {
  if (gameOver) return;
  let rotations = 0;
  if (direction === 'up') rotations = 3;
  else if (direction === 'right') rotations = 2;
  else if (direction === 'down') rotations = 1;

  let g = grid;
  for (let i = 0; i < rotations; i++) g = rotateGridCW(g);

  let anyMoved = false;
  const newGrid = g.map(row => {
    const { row: newRow, moved } = slideRowLeft(row);
    if (moved) anyMoved = true;
    return newRow;
  });

  let result = newGrid;
  for (let i = 0; i < (4 - rotations) % 4; i++) result = rotateGridCW(result);

  if (anyMoved) {
    grid = result;
    addRandomTile();
    render();
    checkGameState();
  }
}

function canMove() {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return true;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
      if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
    }
  }
  return false;
}

function checkGameState() {
  const hasWon = grid.some(row => row.some(v => v === 2048));
  if (hasWon) {
    messageEl.textContent = '🎉 2048을 만들었습니다!';
    gameOver = true;
    return;
  }
  if (!canMove()) {
    messageEl.textContent = '게임 오버';
    gameOver = true;
  }
}

document.addEventListener('keydown', (e) => {
  const map = {
    ArrowUp: 'up', ArrowDown: 'down',
    ArrowLeft: 'left', ArrowRight: 'right'
  };
  if (map[e.key]) {
    e.preventDefault();
    move(map[e.key]);
  }
});

restartBtn.addEventListener('click', initGame);
initGame();
</script>
</body>
</html>
