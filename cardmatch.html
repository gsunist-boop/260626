<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카드 짝맞추기</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #2c3e50;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
  }
  a.back {
    align-self: flex-start;
    margin-left: 20px;
    margin-bottom: 10px;
    text-decoration: none;
    color: #ddd;
    font-size: 14px;
  }
  h1 { margin-bottom: 10px; }
  #panel {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    font-size: 16px;
    font-weight: bold;
  }
  button.restart {
    font-size: 14px;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background: #e67e22;
    color: #fff;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 90px);
    gap: 12px;
  }
  .card {
    width: 90px;
    height: 90px;
    background: #34495e;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .card.flipped {
    background: #ecf0f1;
    color: #2c3e50;
  }
  .card.matched {
    background: #27ae60;
    cursor: default;
  }
  #message {
    margin-top: 16px;
    font-size: 18px;
    font-weight: bold;
    min-height: 24px;
  }
</style>
</head>
<body>
<a class="back" href="index.html">← 허브로 돌아가기</a>
<h1>🃏 카드 짝맞추기</h1>
<div id="panel">
  <div id="moves">시도: 0</div>
  <button class="restart" id="restartBtn">새 게임</button>
</div>
<div id="board"></div>
<div id="message"></div>

<script>
const emojis = ['🍎','🍌','🍇','🍉','🍓','🍒','🍍','🥝'];
const boardEl = document.getElementById('board');
const movesEl = document.getElementById('moves');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

let cards = [];
let flipped = [];
let matchedCount = 0;
let moves = 0;
let locked = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initGame() {
  cards = shuffle([...emojis, ...emojis]).map(emoji => ({
    emoji, flipped: false, matched: false
  }));
  flipped = [];
  matchedCount = 0;
  moves = 0;
  locked = false;
  movesEl.textContent = '시도: 0';
  messageEl.textContent = '';
  render();
}

function render() {
  boardEl.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card' + (card.flipped ? ' flipped' : '') + (card.matched ? ' matched' : '');
    el.textContent = (card.flipped || card.matched) ? card.emoji : '';
    el.addEventListener('click', () => onCardClick(i));
    boardEl.appendChild(el);
  });
}

function onCardClick(i) {
  if (locked) return;
  const card = cards[i];
  if (card.flipped || card.matched) return;

  card.flipped = true;
  flipped.push(i);
  render();

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = `시도: ${moves}`;
    const [a, b] = flipped;
    if (cards[a].emoji === cards[b].emoji) {
      cards[a].matched = true;
      cards[b].matched = true;
      matchedCount += 2;
      flipped = [];
      render();
      if (matchedCount === cards.length) {
        messageEl.textContent = `🎉 모두 맞췄습니다! (${moves}번 시도)`;
      }
    } else {
      locked = true;
      setTimeout(() => {
        cards[a].flipped = false;
        cards[b].flipped = false;
        flipped = [];
        locked = false;
        render();
      }, 700);
    }
  }
}

restartBtn.addEventListener('click', initGame);
initGame();
</script>
</body>
</html>
