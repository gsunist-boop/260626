<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>틱택토</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
  }
  a.back {
    align-self: flex-start;
    margin-left: 20px;
    margin-bottom: 10px;
    text-decoration: none;
    color: #555;
    font-size: 14px;
  }
  h1 { margin-bottom: 10px; }
  #status {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 16px;
    min-height: 24px;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 6px;
    background: #333;
    padding: 6px;
    border-radius: 8px;
  }
  .cell {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    user-select: none;
  }
  .cell.x { color: #e74c3c; }
  .cell.o { color: #3498db; }
  .cell.win { background: #d4edda; }
  button.restart {
    margin-top: 20px;
    font-size: 14px;
    padding: 8px 16px;
    cursor: pointer;
  }
</style>
</head>
<body>
<a class="back" href="index.html">← 허브로 돌아가기</a>
<h1>❌⭕ 틱택토</h1>
<div id="status">X의 차례입니다</div>
<div id="board"></div>
<button class="restart" id="restartBtn">새 게임</button>

<script>
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const restartBtn = document.getElementById('restartBtn');

let board = Array(9).fill(null);
let current = 'X';
let gameOver = false;

const winLines = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function render() {
  boardEl.innerHTML = '';
  board.forEach((val, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (val ? ' ' + val.toLowerCase() : '');
    cell.textContent = val || '';
    cell.addEventListener('click', () => onCellClick(i));
    boardEl.appendChild(cell);
  });
}

function onCellClick(i) {
  if (gameOver || board[i]) return;
  board[i] = current;
  const winLine = checkWin(current);
  if (winLine) {
    render();
    highlightWin(winLine);
    statusEl.textContent = `${current} 승리!`;
    gameOver = true;
    return;
  }
  if (board.every(v => v)) {
    render();
    statusEl.textContent = '무승부입니다';
    gameOver = true;
    return;
  }
  current = current === 'X' ? 'O' : 'X';
  statusEl.textContent = `${current}의 차례입니다`;
  render();
}

function checkWin(player) {
  return winLines.find(line => line.every(i => board[i] === player));
}

function highlightWin(line) {
  line.forEach(i => boardEl.children[i].classList.add('win'));
}

function restart() {
  board = Array(9).fill(null);
  current = 'X';
  gameOver = false;
  statusEl.textContent = 'X의 차례입니다';
  render();
}

restartBtn.addEventListener('click', restart);
render();
</script>
</body>
</html>
